<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kisan Alert — Farmer App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="stage">
    <!-- Phone frame; screens are rendered into .viewport by app.js -->
    <div class="phone">
      <div class="statusbar" id="statusbar">
        <span>9:41</span>
        <span class="sb-icons">
          <span class="mi">network_cell</span>
          <span class="mi">wifi</span>
          <span class="mi">battery_full</span>
        </span>
      </div>
      <div class="viewport" id="viewport"></div>
    </div>
    <p class="hint">Farmer-facing app · drives the live Kisan Alert gateway</p>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
